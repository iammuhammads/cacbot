name: E2E Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PUBLIC_BASE_URL: http://localhost:3000
      CAC_PORTAL_URL: ${{ secrets.CAC_PORTAL_URL }}
      CAC_EMAIL: ${{ secrets.CAC_EMAIL }}
      CAC_PASSWORD: ${{ secrets.CAC_PASSWORD }}
      CAC_STATIC_OTP: ${{ secrets.CAC_STATIC_OTP }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start app (background)
        run: npm run dev & npx wait-on http://localhost:3000 -t 60000

      - name: Run Playwright tests
        run: npx playwright test --forbid-only --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
